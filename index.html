* { box-sizing: border-box; }

.filter-wrap { margin: 26px 0 18px; position: relative; }

.filter-wrap svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }
.drives-table { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg-1); }
.drives-header { display: grid; grid-template-columns: 60px 100px 1fr 120px 100px; padding: 14px 24px; background: var(--bg-2); border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); gap: 10px; }

.drives-list .row.hidden { display: none; }

const drivesList = document.getElementById('drivesList');
function renderDrives(filter = '') {
  const q = filter.toLowerCase();
  let visibleCount = 0;
  const rows = DRIVE_DATA.map((d, i) => {
    const matched = !q || d.drive.toLowerCase().includes(q);
    if (matched) visibleCount++;
    // 連番ファイル名（ASCII安全）なので encodeURIComponent 不要だが念のため
    return `<a class="row${matched ? '' : ' hidden'}" href="drives/${d.filename}">
      <span class="idx">${String(i+1).padStart(3, '0')}</span>
      <span class="count">${d.node_count.toLocaleString()}</span>
      <span class="name">${escapeHtml(d.drive)}</span>
      <span class="users">${d.user_count} users</span>
      <span class="meta">OPEN →</span>
    </a>`;
  }).join('');
  drivesList.innerHTML = rows + (visibleCount === 0 ? '<div class="empty">該当するドライブが見つかりません</div>' : '');
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
document.getElementById('filterInput').addEventListener('input', e => renderDrives(e.target.value));
renderDrives();
</script>
